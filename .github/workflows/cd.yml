name: CD

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: swift build -c release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
