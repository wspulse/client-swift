name: CI

on:
  workflow_dispatch:
  push:
    branches:
      [main, develop, "feat/**", "feature/**", "refactor/**", "bugfix/**", "fix/**", "chore/**"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/instructions/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/instructions/**"

jobs:
  lint-test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test --filter WspulseClientTests --skip ClientIntegrationTests

  check:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-test]
    steps:
      - name: Verify lint-test passed
        run: |
          if [[ "${{ needs.lint-test.result }}" != "success" ]]; then
            echo "lint-test failed"
            exit 1
          fi
